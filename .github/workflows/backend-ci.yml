name: backend-ci

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: football_scouting
          POSTGRES_USER: scouting_user
          POSTGRES_PASSWORD: scouting_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U scouting_user -d football_scouting"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: backend

    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/football_scouting
      SPRING_DATASOURCE_USERNAME: scouting_user
      SPRING_DATASOURCE_PASSWORD: scouting_pass

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Grant execute permission to Maven wrapper
        run: chmod +x mvnw

      - name: Run Maven verify
        run: ./mvnw --batch-mode --no-transfer-progress clean verify

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build backend image (check only)
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: football-scouting-backend:ci